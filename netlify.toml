# Album download site — Netlify
# Set env vars in Netlify UI: Site settings → Environment variables

[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA-style routing: /download/* serves the same download page (JS reads token from path)
[[redirects]]
  from = "/download/*"
  to = "/download.html"
  status = 200
  force = true

# API: download status and use — pass token so function can read it (rewrite strips path)
[[redirects]]
  from = "/api/download/*"
  to = "/.netlify/functions/download?token=:splat"
  status = 200
  force = true

# Admin: generate new tokens (protect with ADMIN_SECRET in production)
[[redirects]]
  from = "/api/admin/generate"
  to = "/.netlify/functions/admin-generate"
  status = 200
  force = true

# Admin: upload album ZIP to Blobs
[[redirects]]
  from = "/api/admin/upload-album"
  to = "/.netlify/functions/admin-upload-album"
  status = 200
  force = true

# Optional: list exhausted tokens (for export/report)
[[redirects]]
  from = "/api/admin/exhausted"
  to = "/.netlify/functions/admin-exhausted"
  status = 200
  force = true

# Admin: list all tokens with status
[[redirects]]
  from = "/api/admin/list-tokens"
  to = "/.netlify/functions/admin-list-tokens"
  status = 200
  force = true

# Admin: delete tokens
[[redirects]]
  from = "/api/admin/delete-tokens"
  to = "/.netlify/functions/admin-delete-tokens"
  status = 200
  force = true

# Admin: view download event log
[[redirects]]
  from = "/api/admin/download-log"
  to = "/.netlify/functions/admin-download-log"
  status = 200
  force = true

# Admin: refund download count for a token
[[redirects]]
  from = "/api/admin/refund"
  to = "/.netlify/functions/admin-refund"
  status = 200
  force = true
